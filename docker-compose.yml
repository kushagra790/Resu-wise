services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: resuwise-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - resuwise-network
    command: mongod --noauth

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resuwise-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/resuwise
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-minimum-32-characters-change-this-in-production}
      JWT_EXPIRE: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      MAX_FILE_SIZE: 10485760
      UPLOAD_DIR: ./uploads
    depends_on:
      - mongodb
    networks:
      - resuwise-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => { if (r.statusCode !== 200) process.exit(1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resuwise-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - backend
    networks:
      - resuwise-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mongodb_data:

networks:
  resuwise-network:
    driver: bridge
