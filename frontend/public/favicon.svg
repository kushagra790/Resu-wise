<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rocketGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="100" height="100" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Rocket -->
  <g transform="translate(50, 50)">
    <!-- Rocket body -->
    <path d="M -5 -20 L 5 -20 L 8 0 L -8 0 Z" fill="url(#rocketGradient)" stroke="white" stroke-width="1"/>
    
    <!-- Rocket tip -->
    <polygon points="0,-25 -3,-20 3,-20" fill="#fbbf24" stroke="white" stroke-width="0.5"/>
    
    <!-- Window -->
    <circle cx="0" cy="-12" r="3" fill="#dbeafe" stroke="white" stroke-width="0.5"/>
    
    <!-- Left fin -->
    <path d="M -8 5 L -12 15 L -8 12 Z" fill="#06b6d4" stroke="white" stroke-width="0.5"/>
    
    <!-- Right fin -->
    <path d="M 8 5 L 12 15 L 8 12 Z" fill="#06b6d4" stroke="white" stroke-width="0.5"/>
    
    <!-- Flame -->
    <ellipse cx="0" cy="12" rx="4" ry="6" fill="#ef4444" opacity="0.8"/>
    <ellipse cx="0" cy="14" rx="2.5" ry="4" fill="#fbbf24" opacity="0.9"/>
  </g>
</svg>