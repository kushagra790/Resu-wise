<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Assessment Quiz</title>
    <style>
        /* Global Styles - Dark Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            width: 100%;
            max-width: 700px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #9ca3af;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        /* Dropdown and Start Button */
        #category-select {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            border: 1px solid #374151;
            background-color: #1f2937;
            color: #f3f4f6;
            margin-bottom: 20px;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #category-select:hover {
            border-color: #3b82f6;
            background-color: #0a0a0a;
        }

        #category-select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        #start-btn {
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            display: inline-block;
            margin-left: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
        }

        /* Question Container */
        #question-container {
            display: none;
            background-color: rgba(31, 41, 55, 0.5);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #374151;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            margin-top: 30px;
        }

        #question-text {
            font-size: 1.4em;
            margin-bottom: 30px;
            color: #f3f4f6;
            font-weight: 600;
            line-height: 1.6;
        }

        .option-button {
            display: block;
            padding: 14px 20px;
            font-size: 16px;
            background-color: rgba(55, 65, 81, 0.5);
            border: 1.5px solid #4b5563;
            border-radius: 10px;
            margin: 12px auto;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #d1d5db;
            font-family: inherit;
            font-weight: 500;
            text-align: left;
        }

        .option-button:hover {
            background-color: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #f3f4f6;
            transform: translateX(5px);
        }

        .option-button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .correct {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3) 0%, rgba(22, 163, 74, 0.2) 100%) !important;
            border-color: #22c55e !important;
            color: #86efac !important;
        }

        .wrong {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3) 0%, rgba(220, 38, 38, 0.2) 100%) !important;
            border-color: #ef4444 !important;
            color: #fca5a5 !important;
        }

        /* Timer */
        #timer {
            font-size: 1.3em;
            color: #f97316;
            margin-top: 30px;
            font-weight: 700;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Score Container */
        #score-container {
            display: none;
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.8) 0%, rgba(17, 24, 39, 0.8) 100%);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 16px;
            border: 1px solid #374151;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            text-align: center;
        }

        #score-container h2 {
            font-size: 2em;
            color: #f3f4f6;
            margin-bottom: 10px;
        }

        #score {
            color: #60a5fa;
            font-weight: 700;
            font-size: 2.5em;
        }

        #score-container p {
            color: #9ca3af;
            font-size: 1.1em;
            margin-top: 15px;
        }

        #restart-btn, #ResumeBuilderPage {
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #restart-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        #restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        #ResumeBuilderPage {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
        }

        #ResumeBuilderPage:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            #start-btn {
                margin-left: 0;
                display: block;
                margin-top: 10px;
                width: 100%;
            }

            #question-container {
                padding: 25px;
            }

            #score-container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>Skill Assessment</h1>
        <p class="subtitle">Test your knowledge and showcase your skills</p>

        <!-- Dropdown for category selection -->
        <div style="text-align: center; margin-bottom: 30px;">
            <select id="category-select">
                <option value="SQL">SQL</option>
                <option value="CODE">Programming</option>
                <option value="REACT">React</option>
                <option value="POSTGRES">Postgres</option>
                <option value="DJANGO">Django</option>
                <option value="NODEJS">Node.js</option>
                <option value="NEXT.JS">Next.js</option>
                <option value="VUEJS">Vue.js</option>
                <option value="WORDPRESS">WordPress</option>
                <option value="LINUX">Linux</option>
                <option value="BASH">Bash</option>
                <option value="DOCKER">Docker</option>
                <option value="DEVOPS">DevOps</option>
            </select>

            <button id="start-btn">Start Quiz</button>
        </div>

        <!-- Timer Display -->
        <div id="timer" style="display: none;"></div>

        <!-- Question and Options -->
        <div id="question-container">
            <h2 id="question-text"></h2>
            <div id="options-container"></div>
        </div>

        <!-- Score Display -->
        <div id="score-container">
            <h2>🎉 Quiz Completed!</h2>
            <p>Your Score: <span id="score"></span></p>
            <button id="restart-btn">Take Another Quiz</button>
            <button id="ResumeBuilderPage">Back to Resume Builder</button>
        </div>
    </div>
</body>


<script>
// Global Variables
const apiToken = "kr74dIaJZI6p9ysIahEfFSFPGmjneHDBT7wDAXZj";
const questionContainer = document.getElementById('question-container');
const scoreContainer = document.getElementById('score-container');
const questionText = document.getElementById('question-text');
const optionsContainer = document.getElementById('options-container');
const startButton = document.getElementById('start-btn');
const scoreElement = document.getElementById('score');
const timerDisplay = document.getElementById('timer');
const restartButton = document.getElementById('restart-btn');
const categorySelect = document.getElementById('category-select');
const categoryDisplayMap = {
    CODE: 'Programming'
};

let questions = [];
let currentQuestionIndex = 0;
let score = 0;
let timer;
let timeLeft = 30;

// Start the quiz
startButton.addEventListener('click', () => {
    startButton.style.display = 'none';
    categorySelect.style.display = 'none'; // Hide the dropdown
    timerDisplay.style.display = 'block'; // Show the timer
    fetchQuestions();
});

// Restart the quiz
restartButton.addEventListener('click', () => {
    scoreContainer.style.display = 'none';
    startButton.style.display = 'inline-block';
    categorySelect.style.display = 'inline-block'; // Show the dropdown again
    timerDisplay.style.display = 'none'; // Hide the timer during score display
    currentQuestionIndex = 0;
    score = 0;
    timeLeft = 30;
    timerDisplay.textContent = "Time Remaining : " + timeLeft; // Reset the timer display
});

async function fetchQuestions() {
    const selectedCategory = categorySelect.value || 'CODE';
    const categoryLabel = categoryDisplayMap[selectedCategory] || categorySelect.options[categorySelect.selectedIndex]?.text || selectedCategory;
    console.log("Fetching questions for category:", selectedCategory, "(", categoryLabel, ")");
    
    // Use backend API - the category must be converted to uppercase for the database
    const url = `/api/quiz/questions?category=${selectedCategory.toUpperCase()}&limit=5`;

    try {
        const response = await fetch(url);
        if (!response.ok) {
            let errorText = `HTTP ${response.status}`;
            const errorJson = await response.json().catch(() => null);
            if (errorJson && (errorJson.message || errorJson.error)) {
                errorText = errorJson.message || errorJson.error;
                if (errorJson.categories && Array.isArray(errorJson.categories) && errorJson.categories.length) {
                    errorText += ` Available categories: ${errorJson.categories.join(', ')}`;
                }
            }
            throw new Error(errorText);
        }

        const data = await response.json();

        if (!data || data.length === 0) {
            alert("No questions found for " + selectedCategory + ". Please try a different category or seed the quiz database.");
            return;
        }

        // Data is already transformed by the backend
        questions = data;
        console.log("Loaded " + questions.length + " questions for " + selectedCategory);

        currentQuestionIndex = 0;
        score = 0;
        showQuestion();
    } catch (error) {
        console.error("Error fetching questions:", error);
        if (error.name === 'TypeError') {
            alert("Could not connect to the quiz backend. Please make sure the app is running and try again.");
        } else {
            alert("Failed to load quiz questions: " + error.message);
        }
    }
}

function showQuestion() {
    const currentQuestion = questions[currentQuestionIndex];
    questionText.textContent = currentQuestion.question;
    optionsContainer.innerHTML = '';
    timeLeft = 30;  // Reset the timer to 30 seconds
    startTimer();   // Start the timer for the new question

    currentQuestionIndex++;

    Object.entries(currentQuestion.answers).forEach(([key, value]) => {
        if (value) {
            const optionButton = document.createElement('button');
            optionButton.textContent = value;
            optionButton.classList.add('option-button');
            optionButton.dataset.answer = key;

            optionButton.addEventListener('click', () => {
                const correctAnswer = currentQuestion.correct_answer;
                if (key === correctAnswer) {
                    score++;
                    optionButton.classList.add('correct');
                } else {
                    optionButton.classList.add('wrong');
                    const correctOptionButton = Array.from(optionsContainer.children).find(btn => btn.dataset.answer === correctAnswer);
                    correctOptionButton.classList.add('correct');
                }

                // Disable all buttons after an answer is chosen
                Array.from(optionsContainer.children).forEach(btn => btn.disabled = true);

                // Move to next question after a delay
                setTimeout(() => {
                    if (currentQuestionIndex < questions.length) {
                        showQuestion();
                    } else {
                        saveScore(categorySelect.value, score);
                        showScore();
                    }
                }, 1000);
            });

            optionsContainer.appendChild(optionButton);
        }
    });

    questionContainer.style.display = 'block';
}

function startTimer() {
    timerDisplay.textContent = timeLeft;
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = "Time Remaining : " + timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                saveScore(categorySelect.value, score);
                showScore();
            }
        }
    }, 1000);
}

// function showScore() {
//     questionContainer.style.display = 'none';
//     scoreContainer.style.display = 'block';
//     scoreElement.textContent = score;
//     timerDisplay.style.display = 'none'; // Hide the timer during the score display
// }

function showScore() {
    let message = score >= 3 ? "Congratulations! You passed the assessment." : "Sorry, you didn't pass the assessment.";
    questionContainer.style.display = 'none';
    scoreContainer.style.display = 'block';
    scoreElement.innerHTML = `${score} <br><p style="font-size: medium;">${message}</p>`;
    timerDisplay.style.display = 'none'; // Hide the timer during the score display
}


function getLoggedInUser() {
    const storedAuthUser = localStorage.getItem('authUser');
    if (storedAuthUser) {
        try {
            return JSON.parse(storedAuthUser);
        } catch (error) {
            console.warn('Failed to parse authUser from localStorage', error);
        }
    }
    return null;
}

function getUserIdentity() {
    const authUser = getLoggedInUser();
    const email = sessionStorage.getItem('email') || authUser?.email || '';
    const fullname = sessionStorage.getItem('fullname') || authUser?.name || authUser?.fullname || '';
    return { email, fullname };
}

// Save the highest score for each skill in browser storage.
function saveScore(skill, newScore) {
    let { email, fullname } = getUserIdentity();

    // If email is not available from session or auth state, prompt the user once.
    if (!email) {
        email = prompt("Please enter your email to save your quiz score:");
        if (!email) {
            console.log("User cancelled email entry. Score not saved.");
            return;
        }
        sessionStorage.setItem('email', email);
    }

    if (!sessionStorage.getItem('fullname') && fullname) {
        sessionStorage.setItem('fullname', fullname);
    }

    try {
        const storageKey = `resuwise_quiz_scores_${email}`;
        const existing = JSON.parse(localStorage.getItem(storageKey) || '{}');
        const scores = existing.scores || {};

        if (!scores[skill] || newScore > scores[skill]) {
            scores[skill] = newScore;
            console.log(`New high score for ${skill}: ${newScore}`);
        } else {
            console.log(`Current score (${newScore}) is not higher than the stored score (${scores[skill]}) for ${skill}.`);
        }

        localStorage.setItem(storageKey, JSON.stringify({ fullname, email, scores }));
        console.log("Score saved successfully in localStorage.");
    } catch (error) {
        console.error("Error saving score:", error);
    }
}
document.getElementById('ResumeBuilderPage').addEventListener('click', function() {
    window.location.href = 'resume-builder.html'; // Redirect to test.html
});


    </script>
</body>
</html>
